name: LaTeX Compilation Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compile-latex:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
      
      - name: Compile all .tex files
        run: |
          find . -name "*.tex" -not -path "./build/*" | while read texfile; do
            echo "Compiling: $texfile"
            dir=$(dirname "$texfile")
            cd "$dir"
            pdflatex -interaction=nonstopmode -halt-on-error "$(basename "$texfile")"
            if [ $? -ne 0 ]; then
              echo "ERROR: Failed to compile $texfile"
              exit 1
            fi
            cd - > /dev/null
          done
      
      - name: Check for PDF output
        run: |
          if [ $(find . -name "*.pdf" | wc -l) -eq 0 ]; then
            echo "ERROR: No PDF files were generated"
            exit 1
          fi
          echo "Successfully compiled $(find . -name '*.pdf' | wc -l) PDF files"